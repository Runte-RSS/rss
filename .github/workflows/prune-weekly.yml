name: Prune old RSS items weekly

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dry run
        run: python prune_feed.py --rss rss.xml --seen seen.json --days 14 --dry-run --debug

      - name: Run prune
        run: python prune_feed.py --rss rss.xml --seen seen.json --days 14 --debug

      - name: Commit changes if any
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add rss.xml seen.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Prune old RSS/seen entries (weekly)" || true
            git push origin HEAD:main
          fi
