name: Update RSS Feed

on:
  push:
    paths:
      - 'generate_feed.py'
      - 'requirements.txt'
      - 'SITES*'
  schedule:
    - cron: '0 * * * *' # hourly; adjust as needed
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip setuptools wheel
            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            else
              echo "No requirements.txt found; installing cloudscraper only"
              pip install cloudscraper
            fi

      - name: Debug Python environment
        run: |
          python -V
          python -c "import sys, pkgutil; print('dateutil present:', pkgutil.find_loader('dateutil') is not None)"
          pip --version
          pip freeze


      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Debug remote access to mangamirror
        run: |
          echo "Runner public IP (for debugging):"
          curl -sS https://ifconfig.me || true
          echo
          echo "HEAD request to a failing page (with browser UA):"
          curl -I -L -sS -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36" \
            -H "Accept: text/html" \
            "https://mangamirror.com/manga/121372-transmigrating-into-the-cyber-game-after-being-on-top-for-killing-boss" || true

      - name: Remove empty RSS items (pre-clean)
        run: |
          python remove_empty_items.py --rss rss.xml --seen seen.json --dry-run || true
          # Inspect dry-run output in logs for a few runs, then run for real:
          python remove_empty_items.py --rss rss.xml --seen seen.json
          git add rss.xml seen.json || true
          if git diff --staged --quiet; then
            echo "No empty items removed"
          else
            git commit -m "Remove empty RSS items (pre-clean)" || true
            git push origin HEAD:main
          fi

      - name: Run feed generator
        run: |
          python generate_feed.py

      - name: Show changed files
        run: |
          git status --porcelain
          git --no-pager diff --name-only

      - name: Commit and push feed changes
        run: |
          # Only commit if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add rss.xml seen.json || true
            git commit -m "Auto-update rss.xml and seen.json (GitHub Actions)" || echo "No commit needed"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi

      - name: Commit and push feed changes (verbose)
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # show what changed
          git status --porcelain
          git --no-pager diff --name-only
          # stage files (no-op if missing)
          git add rss.xml seen.json || true
          # show staged
          git diff --cached --name-only || true
          # commit (fail if commit fails for reasons other than "no changes")
          if git commit -m "Auto-update rss.xml and seen.json (GitHub Actions)"; then
            echo "Committed changes, attempting push..."
          else
            echo "No commit created or commit failed; showing last commit"
            git --no-pager log -n 1 --pretty=oneline
          fi
          # show remote HEAD before push
          git fetch origin
          git rev-parse origin/main || true
          # push and capture output
          if ! git push origin HEAD:main --verbose; then
            echo "Push failed; show remote refs and permissions"
            git remote -v
            git ls-remote origin
            exit 1
          fi




