name: Update RSS Feed

on:
  push:
    paths:
      - 'generate_feed.py'
      - 'requirements.txt'
      - 'SITES*'
  schedule:
    - cron: '0 * * * *' # hourly; adjust as needed
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found; skipping dependency install" >&2
            exit 1
          fi

      - name: Debug Python environment
        run: |
          python -V
          python -c "import sys, pkgutil; print('dateutil present:', pkgutil.find_loader('dateutil') is not None)"
          pip --version
          pip freeze


      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run feed generator
        run: |
          python generate_feed.py

      - name: Show changed files
        run: |
          git status --porcelain
          git --no-pager diff --name-only

      - name: Commit and push feed changes
        run: |
          # Only commit if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add rss.xml seen.json || true
            git commit -m "Auto-update rss.xml and seen.json (GitHub Actions)" || echo "No commit needed"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
